x-worker-env: &worker-env
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  REDIS_URL: redis://redis:6379/0
  MINIO_ENDPOINT: minio:9000
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: minioadmin
  MINIO_BUCKET: duka-raw-data
  MINIO_RAW_BUCKET: duka-raw-data
  PYTHONUNBUFFERED: "1"

x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-deploy-defaults: &deploy-defaults
  restart: unless-stopped
  deploy:
    resources:
      limits:
        cpus: '0.50'
        memory: '512M'

services:

  ####################################################
  # API / Backend
  ####################################################
  api:
    <<: *deploy-defaults
    build: .
    container_name: duka-api
    profiles: ["api"]
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: [".env"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
      minio: { condition: service_healthy }
    networks: [backend]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  backend:
    build: ./backend
    container_name: duka-api-backend
    ports:
      - "8000:8000"
    env_file: [".env"]
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - MINIO_BUCKET=duka-raw-data
      - MINIO_RAW_BUCKET=duka-raw-data
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      minio: { condition: service_healthy }
      kafka: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks:
      - backend

  ####################################################
  # PostgreSQL
  ####################################################
  postgres:
    <<: *deploy-defaults
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-duka}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-duka}
      POSTGRES_DB: ${POSTGRES_DB:-duka_scraper}
    ports: ["${POSTGRES_PORT:-5432}:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-duka} -d ${POSTGRES_DB:-duka_scraper}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ####################################################
  # Redis
  ####################################################
  redis:
    <<: *deploy-defaults
    image: redis:7-alpine
    container_name: redis
    ports: ["${REDIS_PORT:-6379}:6379"]
    networks: [backend]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ####################################################
  # Kafka (Apache Official - KRaft)
  ####################################################
  kafka:
    <<: *deploy-defaults
    image: apache/kafka:3.9.1
    container_name: kafka
    hostname: kafka
    ports:
      - "${KAFKA_PORT:-9092}:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 5

  ####################################################
  # Kafka UI
  ####################################################
  kafka-ui:
    <<: *deploy-defaults
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports: ["${KAFKA_UI_PORT:-8080}:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: Local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on: { kafka: { condition: service_healthy } }
    networks: [backend]

  ####################################################
  # Elasticsearch
  ####################################################
  elasticsearch:
    <<: *deploy-defaults
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '1.5G'
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m" 
    ports: ["${ELASTICSEARCH_PORT:-9200}:9200"]
    volumes: [elasticsearch_data:/usr/share/elasticsearch/data]
    ulimits: { memlock: { soft: -1, hard: -1 }, nofile: { soft: 65536, hard: 65536 } }
    networks: [backend]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=10s"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

  ####################################################
  # Kibana
  ####################################################
  kibana:
    <<: *deploy-defaults
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    ports: ["${KIBANA_PORT:-5601}:5601"]
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on: { elasticsearch: { condition: service_healthy } }
    networks: [backend]

  ####################################################
  # MinIO
  ####################################################
  minio:
    <<: *deploy-defaults
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports: ["${MINIO_PORT:-9000}:9000", "${MINIO_CONSOLE_PORT:-9001}:9001"]
    volumes: [minio_data:/data]
    networks: [backend]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    build: ./minio-init
    container_name: minio-init
    env_file: [".env"]
    depends_on: { minio: { condition: service_healthy } }
    networks: [backend]
    restart: on-failure

  ####################################################
  # Prometheus
  ####################################################
  prometheus:
    <<: *deploy-defaults
    image: prom/prometheus:latest
    container_name: prometheus
    ports: ["${PROMETHEUS_PORT:-9090}:9090"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [backend, monitoring]

  ####################################################
  # Grafana
  ####################################################
  grafana:
    <<: *deploy-defaults
    image: grafana/grafana:latest
    container_name: grafana
    ports: ["${GRAFANA_PORT:-3000}:3000"]
    depends_on: [prometheus]
    volumes: [grafana_data:/var/lib/grafana]
    networks: [monitoring]

  ####################################################
  # Airflow
  ####################################################
  airflow-init:
    container_name: airflow-init
    build:
      dockerfile: app/airflow/Dockerfile
    depends_on: { postgres: { condition: service_healthy } }
    env_file: [".env"]
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-duka}:${POSTGRES_PASSWORD:-duka}@postgres:5432/${POSTGRES_DB:-duka_scraper}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    command: >
      bash -c "
        airflow db upgrade &&
        (airflow users create -r Admin -u ${AIRFLOW_USER:-airflow} -p ${AIRFLOW_PASSWORD:-airflow} -f Airflow -l Admin -e admin@example.com) || true &&
        (airflow connections delete 'duka_api' || true) &&
        airflow connections add 'duka_api' --conn-type 'http' --conn-host 'host.docker.internal' --conn-port ${API_PORT:-8000}
      "
    restart: on-failure
    networks: [backend]

  airflow-webserver:
    <<: *deploy-defaults
    build:
      dockerfile: app/airflow/Dockerfile
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '1G'
    container_name: airflow-webserver
    depends_on: { airflow-init: { condition: service_completed_successfully } }
    ports: ["${AIRFLOW_WEBSERVER_PORT:-8081}:8080"]
    volumes:
      - ./app/airflow/dags:/opt/airflow/dags:ro
      - airflow_logs:/opt/airflow/logs
    env_file: [".env"]
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-duka}:${POSTGRES_PASSWORD:-duka}@postgres:5432/${POSTGRES_DB:-duka_scraper}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    command: webserver
    networks: [backend]
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *deploy-defaults
    build:
      dockerfile: app/airflow/Dockerfile
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '1G'
    container_name: airflow-scheduler
    depends_on: { airflow-init: { condition: service_completed_successfully } }
    volumes:
      - ./app/airflow/dags:/opt/airflow/dags:ro
      - airflow_logs:/opt/airflow/logs
    env_file: [".env"]
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-duka}:${POSTGRES_PASSWORD:-duka}@postgres:5432/${POSTGRES_DB:-duka_scraper}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    command: scheduler
    networks: [backend]

  airflow-triggerer:
    <<: *deploy-defaults
    build:
      dockerfile: app/airflow/Dockerfile
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '1G'
    container_name: airflow-triggerer
    depends_on: { airflow-init: { condition: service_completed_successfully } }
    volumes:
      - ./app/airflow/dags:/opt/airflow/dags:ro
      - airflow_logs:/opt/airflow/logs
    env_file: [".env"]
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-duka}:${POSTGRES_PASSWORD:-duka}@postgres:5432/${POSTGRES_DB:-duka_scraper}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    command: triggerer
    networks: [backend]

  ####################################################
  # Workers
  ####################################################
  surface-worker:
    <<: *deploy-defaults
    build:
      context: .
      dockerfile: workers/Dockerfile
      args:
        WORKER_MODULE: surface-worker
    container_name: surface-worker
    env_file: [".env"]
    environment:
      <<: *worker-env
    depends_on:
      kafka: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    networks: [backend]

  deep-worker:
    <<: *deploy-defaults
    build:
      context: .
      dockerfile: workers/Dockerfile
      args:
        WORKER_MODULE: deep-worker
    container_name: deep-worker
    env_file: [".env"]
    environment:
      <<: *worker-env
    depends_on:
      kafka: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    networks: [backend]

  parser-worker:
    <<: *deploy-defaults
    build:
      context: .
      dockerfile: workers/Dockerfile
      args:
        WORKER_MODULE: parser-worker
    container_name: parser-worker
    env_file: [".env"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BUCKET: parsed-data
      MINIO_RAW_BUCKET: duka-raw-data
      KAFKA_INPUT_TOPIC: crawl.raw
      KAFKA_TOPIC: crawl.raw
      PYTHONUNBUFFERED: "1"
    depends_on:
      kafka: { condition: service_healthy }
      minio: { condition: service_healthy }
    networks: [backend]

  dark-worker:
    <<: *deploy-defaults
    build:
      context: .
      dockerfile: workers/Dockerfile
      args:
        WORKER_MODULE: dark-worker
    container_name: dark-worker
    profiles: [dark]
    env_file: [".env"]
    environment:
      <<: *worker-env
      DARK_ENABLED: ${DARK_ENABLED:-false}
      TOR_PROXY_URL: socks5://tor:9050
    depends_on:
      kafka: { condition: service_healthy }
      redis: { condition: service_healthy }
      tor: { condition: service_started }
      minio: { condition: service_healthy }
    networks: [backend]

  tor:
    <<: *deploy-defaults
    image: dperson/torproxy:latest
    container_name: tor
    profiles: [dark]
    networks: [backend]

volumes:
  postgres_data:
  minio_data:
  elasticsearch_data:
  grafana_data:
  prometheus_data:
  airflow_logs:
  spark_event_logs:

networks:
  backend:
    driver: bridge
  monitoring:
    driver: bridge