x-worker-env: &worker-env
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  REDIS_URL: redis://redis:6379/0

services:

  ####################################################
  # API
  ####################################################
  api:
    build: .
    container_name: duka-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - kafka
      - minio
    restart: unless-stopped

  ####################################################
  # PostgreSQL
  ####################################################
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-duka}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-duka}
      POSTGRES_DB: ${POSTGRES_DB:-duka_scraper}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  ####################################################
  # Redis
  ####################################################
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  ####################################################
  # Kafka (Apache Official - KRaft)
  ####################################################
  kafka:
    image: apache/kafka:3.9.1
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    restart: unless-stopped

  ####################################################
  # Kafka UI
  ####################################################
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: Local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    restart: unless-stopped

  ####################################################
  # Elasticsearch (disabled by default to avoid registry TLS issues)
  ####################################################
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    profiles: ["full"]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  ####################################################
  # Kibana (disabled by default to avoid registry TLS issues)
  ####################################################
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    profiles: ["full"]
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      - elasticsearch
    restart: unless-stopped

  ####################################################
  # MinIO
  ####################################################
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  ####################################################
  # Prometheus
  ####################################################
  prometheus:
  
   image: prom/prometheus:latest
   container_name: prometheus
   ports:
    - "9090:9090"
   volumes:
    - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
   restart: unless-stopped

  ####################################################
  # Grafana
  ####################################################
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

  ####################################################
  # Surface Worker
  ####################################################
  surface-worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
      args:
        WORKER_MODULE: surface-worker
    container_name: surface-worker
    env_file:
      - .env
    environment:
      <<: *worker-env
    depends_on:
      - kafka
      - redis
    restart: unless-stopped

  ####################################################
  # Deep Worker
  ####################################################
  deep-worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
      args:
        WORKER_MODULE: deep-worker
    container_name: deep-worker
    env_file:
      - .env
    environment:
      <<: *worker-env
    depends_on:
      - kafka
      - redis
    restart: unless-stopped

  ####################################################
  # Parser Worker
  ####################################################
  parser-worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
      args:
        WORKER_MODULE: parser-worker
    container_name: parser-worker
    env_file:
      - .env
    environment:
      <<: *worker-env
    depends_on:
      - kafka
    restart: unless-stopped

  ####################################################
  # Dark Worker (Optional)
  ####################################################
  dark-worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
      args:
        WORKER_MODULE: dark-worker
    container_name: dark-worker
    env_file:
      - .env
    environment:
      <<: *worker-env
      DARK_ENABLED: ${DARK_ENABLED:-false}
      TOR_PROXY_URL: socks5://tor:9050
    depends_on:
      - kafka
      - redis
      - tor
    profiles:
      - dark
    restart: unless-stopped

  ####################################################
  # Tor Proxy
  ####################################################
  tor:
    image: dperson/torproxy:latest
    container_name: tor
    ports:
      - "9050:9050"
    profiles:
      - dark
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  elasticsearch_data:
  grafana_data: